// ===== State =====
const PER_ROUND = 10;
let studentName = '';
let startTime = null;
let round = 1;
let currentIdx = 0;
let correctSet = new Set();
let wrongSet = new Set();
let selected = null;
let answered = false;
let shuffled = [];
let currentShuffledOrder = [];

function pad(n) { return n.toString().padStart(2, '0'); }

function getNowStr() {
  const d = new Date();
  const dateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  return { dateStr, timeStr, full: `${dateStr} ${timeStr}` };
}

// Login initialization
function initLogin() {
  const now = getNowStr();
  document.getElementById('loginDate').textContent = now.dateStr;
  document.getElementById('loginTime').textContent = now.timeStr;
  document.getElementById('nameInput').addEventListener('input', function() {
    document.getElementById('startBtn').disabled = this.value.trim().length < 1;
  });
  document.getElementById('nameInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim().length >= 1) startQuiz();
  });
}
initLogin();

function startQuiz() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  studentName = name;
  startTime = new Date();
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('studentNameBadge').textContent = '👤 ' + studentName;
    initRound1();
  }

function goHome() {
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('nameInput').value = '';
  document.getElementById('startBtn').disabled = true;
  studentName = '';
  startTime = null;
  const now = getNowStr();
  document.getElementById('loginDate').textContent = now.dateStr;
  document.getElementById('loginTime').textContent = now.timeStr;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initRound1() {
  round = 1;
  currentIdx = 0;
  correctSet = new Set();
  wrongSet = new Set();
  document.getElementById('totalQCount').textContent = ALL_QUESTIONS.length;
  shuffled = shuffle(ALL_QUESTIONS.map(q => q.id)).slice(0, PER_ROUND);
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('retryBtn').classList.add('hidden');
  document.getElementById('wrongTopicList').classList.remove('show');
  document.getElementById('questionCard').classList.remove('hidden');
  document.getElementById('btnArea').classList.remove('hidden');
  document.getElementById('roundLabel').textContent = '第 1 轮 · 随机抽10题';
  document.getElementById('roundLabel').style.display = 'inline-block';
  document.getElementById('roundTag').textContent = '📖 随机抽题';
  document.getElementById('roundTag').className = '';
  showQuestion();
}

function showQuestion() {
  const total = shuffled.length;
  const qid = shuffled[currentIdx];
  const q = ALL_QUESTIONS.find(x => x.id === qid);

  document.getElementById('qNumber').textContent = `第 ${currentIdx+1} 题（共 ${total} 题）· 题库共 ${ALL_QUESTIONS.length} 道`;

  const tagMap = {bump:'tag-bump',set:'tag-set',spike:'tag-spike',serve:'tag-serve',block:'tag-block',defense:'tag-defense',footwork:'tag-footwork',tech:'tag-tech',tf:'tag-tech',multi:'tag-tech'};
  const tagCls = tagMap[q.tagType] || 'tag-tech';
  const tagNames = {bump:'垫球',set:'传球',spike:'扣球',serve:'发球',block:'拦网',defense:'防守',footwork:'步法',tech:'综合',tf:'判断',multi:'综合'};
  const tagName = tagNames[q.tagType] || '技术';
  const isMulti = q.multi === true;
  document.getElementById('qTags').innerHTML = `<span class="tag ${tagCls}">${tagName}</span>${isMulti ? '<span class="multi-hint">多选题</span>' : ''}`;
  document.getElementById('qText').textContent = q.question;

  // Pad ALL options to same length
  const optTexts = q.options.map(o => o);
  const maxLen = Math.max(...optTexts.map(o => o.length));
  const targetLen = Math.ceil((maxLen + 1) / 5) * 5;
  const paddedOpts = optTexts.map(o => {
    const padCount = targetLen - o.length;
    if (padCount <= 0) return o;
    return o + '<span class="pad-fill">' + '一'.repeat(padCount) + '</span>';
  });

  // Shuffle option order
  const optCount = q.options.length;
  const indices = Array.from({length: optCount}, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  currentShuffledOrder = indices;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  const letters = optCount === 2 ? ['✓', '✗'] : ['A', 'B', 'C', 'D'];
  indices.forEach((origIdx, displayIdx) => {
    const div = document.createElement('div');
    div.className = 'option';
    const lCls = isMulti ? 'letter square' : 'letter';
    div.innerHTML = `<span class="${lCls}">${letters[displayIdx]}</span><span style="flex:1">${paddedOpts[origIdx]}</span>`;
    div.dataset.origIdx = origIdx;
    div.onclick = () => selectOption(origIdx, isMulti);
    optDiv.appendChild(div);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('nextBtn').textContent = '提交答案';
  selected = isMulti ? [] : null;
  answered = false;
  updateProgress();
  updateScore();
}

function selectOption(idx, isMulti) {
  if (answered) return;
  if (isMulti) {
    const pos = selected.indexOf(idx);
    if (pos >= 0) selected.splice(pos, 1);
    else selected.push(idx);
    document.querySelectorAll('.option').forEach((el) => {
      const oi = parseInt(el.dataset.origIdx);
      el.classList.toggle('selected', selected.indexOf(oi) >= 0);
    });
    document.getElementById('nextBtn').disabled = selected.length === 0;
  } else {
    selected = idx;
    document.querySelectorAll('.option').forEach((el) => el.classList.toggle('selected', parseInt(el.dataset.origIdx) === idx));
    document.getElementById('nextBtn').disabled = false;
  }
}

function handleNext() {
  if (!answered) submitAnswer();
  else nextQuestion();
}

function submitAnswer() {
  if ((Array.isArray(selected) && selected.length === 0) || (!Array.isArray(selected) && selected === null)) return;
  answered = true;
  const qid = shuffled[currentIdx];
  const q = ALL_QUESTIONS.find(x => x.id === qid);
  const isMulti = q.multi === true;
  let correct = false;

  const opts = document.querySelectorAll('.option');
  if (isMulti) {
    const ansArr = q.multiAnswer;
    const sortedSelected = [...selected].sort();
    const sortedAnswer = [...ansArr].sort();
    correct = sortedSelected.length === sortedAnswer.length && sortedSelected.every((v,i) => v === sortedAnswer[i]);
    opts.forEach((el) => {
      el.classList.add('disabled');
      const oi = parseInt(el.dataset.origIdx);
      if (ansArr.indexOf(oi) >= 0) el.classList.add('show-correct');
      if (selected.indexOf(oi) >= 0 && ansArr.indexOf(oi) < 0) el.classList.add('wrong');
    });
  } else {
    correct = selected === q.answer;
    opts.forEach((el) => {
      el.classList.add('disabled');
      if (parseInt(el.dataset.origIdx) === q.answer) el.classList.add('show-correct');
      if (parseInt(el.dataset.origIdx) === selected && !correct) el.classList.add('wrong');
    });
  }

  const fb = document.getElementById('feedback');
  if (correct) {
    fb.className = 'feedback correct show';
    document.getElementById('fbText').textContent = '✅ 回答正确！';
    correctSet.add(qid);
  } else {
    fb.className = 'feedback wrong show';
    document.getElementById('fbText').textContent = '❌ 回答错误';
    wrongSet.add(qid);
  }
  document.getElementById('fbExplain').textContent = q.explain;
  document.getElementById('nextBtn').textContent = currentIdx < shuffled.length - 1 ? '下一题 →' : '查看成绩';
  updateScore();
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= shuffled.length) showResult();
  else showQuestion();
}

function updateProgress() {
  const total = shuffled.length;
  const pct = (currentIdx / total * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `第 ${currentIdx+1} / ${total} 题`;
}

function updateScore() {
  const total = shuffled.length;
  const done = currentIdx + (answered ? 1 : 0);
  const pct = (done / total * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `第 ${Math.min(done, total)} / ${total} 题`;
  document.getElementById('correctCount').textContent = correctSet.size;
  document.getElementById('wrongCount').textContent = wrongSet.size;
}

function showResult() {
  document.getElementById('questionCard').classList.add('hidden');
  document.getElementById('btnArea').classList.add('hidden');
  document.getElementById('resultCard').classList.add('show');

  const total = shuffled.length;
  const correct = correctSet.size;

  // Show name and date/time
  const endTime = new Date();
  const endStr = getNowStr();
  const duration = Math.round((endTime - startTime) / 1000);
  const durMin = Math.floor(duration / 60);
  const durSec = duration % 60;
  document.getElementById('resultName').textContent = '👤 ' + studentName;
  document.getElementById('resultDateTime').textContent = `📅 ${endStr.full}  ⏱ ${durMin}分${durSec}秒`;

  document.getElementById('finalScore').textContent = correct;
  document.getElementById('resultDetail').innerHTML = `答对 <span>${correct}</span> 题，答错 <span>${total - correct}</span> 题，正确率 <span>${(correct/total*100).toFixed(0)}%</span>`;

  if (wrongSet.size > 0) {
    document.getElementById('resultBreakdown').innerHTML = `薄弱环节涉及 ${wrongSet.size} 道技术题需要加强`;
    document.getElementById('retryBtn').classList.remove('hidden');
  } else {
    document.getElementById('resultBreakdown').textContent = '全部答对，太棒了！🎉';
  }
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = `${total} / ${total} 题 · 完成`;
}

function startRound2() {
  if (wrongSet.size === 0) return;
  round = 2;
  currentIdx = 0;
  shuffled = shuffle([...wrongSet]);
  wrongSet = new Set();

  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('retryBtn').classList.add('hidden');
  document.getElementById('questionCard').classList.remove('hidden');
  document.getElementById('btnArea').classList.remove('hidden');

  document.getElementById('roundLabel').textContent = '第 2 轮 · 薄弱环节再测';
  document.getElementById('roundLabel').style.display = 'inline-block';
  document.getElementById('roundTag').textContent = '🎯 薄弱环节再测（仅错题）';
  document.getElementById('roundTag').className = 'r2';

  const wrongDiv = document.getElementById('wrongTopicList');
  wrongDiv.innerHTML = `<strong>本轮针对 ${shuffled.length} 道错题进行再测：</strong>`;
  wrongDiv.classList.add('show');
  showQuestion();
}

function restart() {
  goHome();
}

initRound1();
</script>
