<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏐 排球规则测验</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    background: #f0f4f8;
    color: #1a2332;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 720px; margin: 0 auto; padding-bottom: 80px; }

  .header {
    text-align: center;
    padding: 28px 20px 20px;
    background: linear-gradient(135deg, #1F4E79, #2E75B6);
    border-radius: 16px;
    color: #fff;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(31,78,121,0.25);
  }
  .header h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; }
  .header p { font-size: 14px; opacity: 0.85; margin-top: 6px; }
  .header .badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    margin-top: 10px;
  }
  .header .badge-num {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    margin-top: 8px;
  }

  .progress-wrap {
    background: #fff;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .progress-bar {
    height: 6px;
    background: #e2e8f0;
    border-radius: 3px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, #2E75B6, #4A9BDB);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #64748b;
  }
  .progress-info .score { color: #1F4E79; font-weight: 700; }

  .round-badge { text-align: center; margin-bottom: 12px; }
  .round-badge span {
    display: inline-block;
    background: #fff;
    border: 2px solid #2E75B6;
    color: #2E75B6;
    padding: 4px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
  }
  .round-badge .r2 { border-color: #CC0000; color: #CC0000; }

  .question-card {
    background: #fff;
    border-radius: 14px;
    padding: 24px 24px 16px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .q-number {
    font-size: 13px;
    color: #2E75B6;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .q-tags { margin-bottom: 10px; }
  .q-tags .tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 10px;
    margin-right: 4px;
  }
  .tag-tech { background: #E8F4FD; color: #2E75B6; }
  .tag-rule { background: #FCE4EC; color: #880E4F; }
  .tag-rule { background: #FCE4EC; color: #880E4F; }
  .tag-bump { background: #E8F4FD; color: #2E75B6; }
  .tag-set { background: #FFF3E0; color: #E65100; }
  .tag-spike { background: #FFEBEE; color: #C62828; }
  .tag-serve { background: #E8F5E9; color: #2E7D32; }
  .tag-block { background: #F3E5F5; color: #6A1B9A; }
  .tag-defense { background: #E0F7FA; color: #00695C; }
  .tag-footwork { background: #FCE4EC; color: #880E4F; }

  .q-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 18px;
    color: #1a2332;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    line-height: 1.5;
  }
  .option:hover:not(.disabled) { border-color: #2E75B6; background: #F5F9FF; }
  .option .letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    color: #64748b;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option .letter.square { border-radius: 4px; }
  .option.selected { border-color: #2E75B6; background: #EBF4FF; }
  .option.selected .letter { background: #2E75B6; color: #fff; }
  .option.correct { border-color: #16a34a; background: #F0FFF4; }
  .option.correct .letter { background: #16a34a; color: #fff; }
  .option.wrong { border-color: #dc2626; background: #FFF5F5; }
  .option.wrong .letter { background: #dc2626; color: #fff; }
  .option.disabled { cursor: default; opacity: 0.95; }
  .option.show-correct { border-color: #16a34a; background: #F0FFF4; }
  .option.show-correct .letter { background: #16a34a; color: #fff; }
  .multi-hint { font-size: 12px; color: #E65100; background: #FFF3E0; display: inline-block; padding: 2px 10px; border-radius: 8px; margin-left: 8px; }

  .feedback {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: #F0FFF4; border: 1px solid #bbf7d0; color: #166534; }
  .feedback.wrong { background: #FFF5F5; border: 1px solid #fecaca; color: #991b1b; }
  .feedback .explain { margin-top: 6px; font-size: 13px; color: #4b5563; }

  .pad-fill { color: transparent; user-select: none; pointer-events: none; }

  .btn-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 12px 20px 16px;
    background: linear-gradient(to top, rgba(255,255,255,0.95) 60%, rgba(255,255,255,0));
    z-index: 50;
    pointer-events: none;
  }
  .btn-area .btn {
    pointer-events: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .btn {
    display: inline-block;
    padding: 12px 40px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary { background: #2E75B6; color: #fff; }
  .btn-primary:hover { background: #1F4E79; transform: translateY(-1px); }
  .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-success:hover { background: #15803d; }
  .btn-outline { background: #fff; color: #2E75B6; border: 2px solid #2E75B6; }
  .btn-outline:hover { background: #F5F9FF; }

  .result-card {
    background: #fff;
    border-radius: 14px;
    padding: 36px 24px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: none;
  }
  .result-card.show { display: block; }
  .result-card .big-score { font-size: 56px; font-weight: 800; color: #1F4E79; }
  .result-card .label { font-size: 16px; color: #64748b; margin: 4px 0 16px; }
  .result-card .detail { font-size: 14px; color: #4b5563; line-height: 1.8; }
  .result-card .detail span { font-weight: 700; }
  .result-card .breakdown { margin-top: 16px; font-size: 13px; color: #64748b; }
  .result-card .btn { margin-top: 20px; }

  .wrong-topic-list {
    margin-top: 16px;
    padding: 14px 16px;
    background: #FFF8F0;
    border-radius: 10px;
    border: 1px solid #fed7aa;
    display: none;
    font-size: 13px;
    line-height: 1.7;
  }
  .wrong-topic-list.show { display: block; }
  .wrong-topic-list strong { color: #c2410c; }

  .hidden { display: none; }

  /* Login overlay */
  .login-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15,23,42,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    backdrop-filter: blur(4px);
  }
  .login-overlay.hidden { display: none; }
  .login-card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 36px 32px;
    width: 380px;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: slideUp 0.35s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .login-icon { font-size: 48px; margin-bottom: 8px; }
  .login-card h2 { font-size: 22px; color: #1F4E79; margin-bottom: 2px; }
  .login-sub { font-size: 13px; color: #64748b; margin-bottom: 24px; }
  .login-form { display: flex; flex-direction: column; gap: 12px; }
  .login-form label { font-size: 14px; font-weight: 600; color: #1a2332; text-align: left; }
  .login-form input {
    padding: 14px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }
  .login-form input:focus { border-color: #2E75B6; }
  .login-form input::placeholder { color: #94a3b8; }
  .login-info {
    display: flex; justify-content: center; gap: 20px;
    font-size: 13px; color: #64748b; padding: 4px 0;
  }
  .login-form .btn { margin-top: 8px; width: 100%; padding: 14px; font-size: 16px; }
  .login-form .btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

  /* Result header */
  .result-header {
    display: flex; align-items: center; gap: 14px;
    background: #F0F7FF;
    border: 1px solid #D6E4F0;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 18px;
    text-align: left;
  }
  .result-stamp { font-size: 36px; }
  .result-meta { display: flex; flex-direction: column; gap: 2px; }
  .result-meta span:first-child {
    font-size: 16px; font-weight: 700; color: #1F4E79;
  }
  .result-meta span:last-child {
    font-size: 12px; color: #64748b;
  }
  .result-footer-note {
    margin-top: 14px;
    font-size: 11px;
    color: #94a3b8;
    border-top: 1px dashed #e2e8f0;
    padding-top: 14px;
  }

  @media (max-width: 480px) {
    .container { padding: 0 12px 80px; }
    .question-card { padding: 20px 16px; }
    .q-text { font-size: 16px; }
    .option { font-size: 14px; padding: 11px 14px; }
  }
</style>
</head>
<body>
<div class="container" id="app">

  <!-- Login overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-icon">🏐</div>
      <h2>排球技术测验</h2>
      <p class="login-sub">排球 · 竞赛规则测试</p>
      <div class="login-form">
        <label>请输入你的姓名</label>
        <input type="text" id="nameInput" placeholder="输入姓名后点击开始" maxlength="20" autocomplete="off">
        <div class="login-info">
          <span>📅 <span id="loginDate"></span></span>
          <span>⏰ <span id="loginTime"></span></span>
        </div>
        <button class="btn btn-primary" id="startBtn" onclick="startQuiz()" disabled>开始测验</button>
      </div>
    </div>
  </div>

  <div class="header">
    <h1>🏐 排球规则测验</h1>
    <p>排球 · 竞赛规则测试</p>
    <div class="badge" id="studentNameBadge"></div>
    <div class="badge" id="roundLabel" style="display:none;"></div>
    <div class="badge-num">题库共 <span id="totalQCount">150</span> 道规则题 · 每次随机20道</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-info">
      <span id="progressText">第 1 / 20 题</span>
      <span class="score">✅ <span id="correctCount">0</span>  ❌ <span id="wrongCount">0</span></span>
    </div>
  </div>

  <div class="round-badge" id="roundIndicator">
    <span id="roundTag">📖 随机抽题</span>
  </div>

  <div class="question-card" id="questionCard">
    <div class="q-number" id="qNumber">第 1 题</div>
    <div class="q-tags" id="qTags"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback">
      <div class="fb-text" id="fbText"></div>
      <div class="explain" id="fbExplain"></div>
    </div>
  </div>

  <div class="btn-area" id="btnArea">
    <button class="btn btn-primary" id="nextBtn" disabled onclick="handleNext()">提交答案</button>
  </div>

  <div class="wrong-topic-list" id="wrongTopicList"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-stamp" id="resultStamp">🏆</div>
      <div class="result-meta">
        <span id="resultName"></span>
        <span id="resultDateTime"></span>
      </div>
    </div>
    <div class="big-score" id="finalScore">0</div>
    <div class="label">答对 / 20 题</div>
    <div class="detail" id="resultDetail"></div>
    <div class="breakdown" id="resultBreakdown"></div>
    <div class="result-footer-note">⏱ 本次测试完成时间已记录，不可重复使用同一截图</div>
    <button class="btn btn-outline" onclick="goHome()">🏠 返回首页</button>
    <button class="btn btn-success hidden" id="retryBtn" onclick="startRound2()">📝 针对薄弱环节再测</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
{id:1,tags:['规则'],tagType:'rule',question:'标准排球场的尺寸是多少？',options:['16m×8m','18m×9m','20m×10m','15m×7.5m'],answer:1,explain:'[规则1.1]'},
{id:2,tags:['规则'],tagType:'rule',question:'球网高度男子和女子分别是多少？',options:['男子2.35m女子2.15m','男子2.43m女子2.24m','男子2.50m女子2.30m','男子2.40m女子2.20m'],answer:1,explain:'[规则2.1.1]'},
{id:3,tags:['规则'],tagType:'rule',question:'标志杆的长度和超出球网的高度是多少？',options:['长1.50m超出60cm','长1.80m超出80cm','长2.00m超出100cm','长1.60m超出70cm'],answer:1,explain:'[规则2.4]'},
{id:4,tags:['规则'],tagType:'rule',question:'比赛用球的标准周长和重量是多少？',options:['63-65cm 240-260g','65-67cm 260-280g','67-69cm 280-300g','64-66cm 250-270g'],answer:1,explain:'[规则3.1]'},
{id:5,tags:['规则'],tagType:'rule',question:'球的内压标准是多少？',options:['0.20-0.25kg/cm²','0.30-0.325kg/cm²','0.35-0.40kg/cm²','0.25-0.30kg/cm²'],answer:1,explain:'[规则3.1]'},
{id:6,tags:['规则'],tagType:'rule',question:'球网高度是从哪里测量的？',options:['从边线处','从场地中心','从端线处','从标志杆处'],answer:0,explain:'[规则2.1.2]'},
{id:7,tags:['规则'],tagType:'rule',question:'球网宽多少米？',options:['0.8m','1m','1.2m','0.9m'],answer:1,explain:'[规则2.2]'},
{id:8,tags:['规则'],tagType:'rule',question:'标志杆颜色条纹间隔多少厘米？',options:['5cm','10cm','15cm','20cm'],answer:1,explain:'[规则2.4]'},
{id:9,tags:['规则'],tagType:'rule',question:'场地所有线条的宽度是多少厘米？',options:['3cm','5cm','8cm','10cm'],answer:1,explain:'[规则1.3.1]'},
{id:10,tags:['规则'],tagType:'rule',question:'FIVB赛事边线外自由区宽度是多少？',options:['3m','5m','6.5m','8m'],answer:1,explain:'[规则1.1]'},
{id:11,tags:['规则'],tagType:'rule',question:'FIVB赛事端线外自由区宽度是多少？',options:['3m','5m','6.5m','8m'],answer:2,explain:'[规则1.1]'},
{id:12,tags:['规则'],tagType:'rule',question:'比赛场地上方无障碍区最低高度？',options:['5m','7m','10m','12.5m'],answer:1,explain:'[规则1.1]'},
{id:13,tags:['规则'],tagType:'rule',question:'FIVB赛事无障碍区最低高度？',options:['7m','10m','12.5m','15m'],answer:2,explain:'[规则1.1]'},
{id:14,tags:['规则'],tagType:'rule',question:'比赛场地最低照明标准？',options:['100勒克斯','300勒克斯','500勒克斯','1000勒克斯'],answer:1,explain:'[规则1.6]'},
{id:15,tags:['规则'],tagType:'rule',question:'FIVB赛事场地照明标准？',options:['500勒克斯','1000勒克斯','2000勒克斯','3000勒克斯'],answer:2,explain:'[规则1.6]'},
{id:16,tags:['规则'],tagType:'rule',question:'每场比赛每队最多可报多少名队员？',options:['10名','12名','14名','16名'],answer:1,explain:'[规则4.1.1]'},
{id:17,tags:['规则'],tagType:'rule',question:'FIVB成年赛事每队最多可报多少名队员？',options:['12名','13名','14名','15名'],answer:2,explain:'[规则4.1.1]'},
{id:18,tags:['规则'],tagType:'rule',question:'球员球衣号码范围是多少？',options:['1-12号','1-18号','1-20号','1-99号'],answer:2,explain:'[规则4.3.3]'},

{id:20,tags:['规则'],tagType:'rule',question:'助理教练最多几名？',options:['1名','2名','3名','4名'],answer:1,explain:'[规则4.1.1]'},
{id:21,tags:['规则'],tagType:'rule',question:'号码在胸前的最小高度？',options:['10cm','15cm','20cm','25cm'],answer:1,explain:'[规则4.3.3.2]'},
{id:22,tags:['规则'],tagType:'rule',question:'号码在背后的最小高度？',options:['15cm','18cm','20cm','25cm'],answer:2,explain:'[规则4.3.3.2]'},
{id:23,tags:['规则'],tagType:'rule',question:'号码线条最小宽度？',options:['1cm','2cm','3cm','4cm'],answer:1,explain:'[规则4.3.3.2]'},
{id:24,tags:['规则'],tagType:'rule',question:'队长胸前下划线尺寸？',options:['6×2cm','8×2cm','10×2cm','8×3cm'],answer:1,explain:'[规则4.3.4]'},

{id:29,tags:['规则'],tagType:'rule',question:'一局比赛非决胜局需多少分获胜？',options:['21分','25分','15分','30分'],answer:1,explain:'[规则6.2]'},

// ===== State =====
const PER_ROUND = 20;
let studentName = '';
let startTime = null;
let round = 1;
let currentIdx = 0;
let correctSet = new Set();
let wrongSet = new Set();
let selected = null;
let answered = false;
let shuffled = [];
let currentShuffledOrder = [];

function pad(n) { return n.toString().padStart(2, '0'); }

function getNowStr() {
  const d = new Date();
  const dateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  return { dateStr, timeStr, full: `${dateStr} ${timeStr}` };
}

// Login initialization
function initLogin() {
  const now = getNowStr();
  document.getElementById('loginDate').textContent = now.dateStr;
  document.getElementById('loginTime').textContent = now.timeStr;
  document.getElementById('nameInput').addEventListener('input', function() {
    document.getElementById('startBtn').disabled = this.value.trim().length < 1;
  });
  document.getElementById('nameInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim().length >= 1) startQuiz();
  });
}
initLogin();

function startQuiz() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  studentName = name;
  startTime = new Date();
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('studentNameBadge').textContent = '👤 ' + studentName;
    initRound1();
  }

function goHome() {
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('nameInput').value = '';
  document.getElementById('startBtn').disabled = true;
  studentName = '';
  startTime = null;
  const now = getNowStr();
  document.getElementById('loginDate').textContent = now.dateStr;
  document.getElementById('loginTime').textContent = now.timeStr;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initRound1() {
  round = 1;
  currentIdx = 0;
  correctSet = new Set();
  wrongSet = new Set();
  document.getElementById('totalQCount').textContent = ALL_QUESTIONS.length;
  shuffled = shuffle(ALL_QUESTIONS.map(q => q.id)).slice(0, PER_ROUND);
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('retryBtn').classList.add('hidden');
  document.getElementById('wrongTopicList').classList.remove('show');
  document.getElementById('questionCard').classList.remove('hidden');
  document.getElementById('btnArea').classList.remove('hidden');
  document.getElementById('roundLabel').textContent = '第 1 轮 · 随机抽20题';
  document.getElementById('roundLabel').style.display = 'inline-block';
  document.getElementById('roundTag').textContent = '📖 随机抽题';
  document.getElementById('roundTag').className = '';
  showQuestion();
}

function showQuestion() {
  const total = shuffled.length;
  const qid = shuffled[currentIdx];
  const q = ALL_QUESTIONS.find(x => x.id === qid);

  document.getElementById('qNumber').textContent = `第 ${currentIdx+1} 题（共 ${total} 题）· 题库共 ${ALL_QUESTIONS.length} 道`;

  const tagMap = {rule:'tag-rule'};
  const tagCls = tagMap[q.tagType] || 'tag-tech';
  const tagNames = {rule:'规则'};
  const tagName = tagNames[q.tagType] || '技术';
  const isMulti = q.multi === true;
  document.getElementById('qTags').innerHTML = `<span class="tag ${tagCls}">${tagName}</span>${isMulti ? '<span class="multi-hint">多选题</span>' : ''}`;
  document.getElementById('qText').textContent = q.question;

  // Pad ALL options to same length
  const optTexts = q.options.map(o => o);
  const maxLen = Math.max(...optTexts.map(o => o.length));
  const targetLen = Math.ceil((maxLen + 1) / 5) * 5;
  const paddedOpts = optTexts.map(o => {
    const padCount = targetLen - o.length;
    if (padCount <= 0) return o;
    return o + '<span class="pad-fill">' + '一'.repeat(padCount) + '</span>';
  });

  // Shuffle option order
  const optCount = q.options.length;
  const indices = Array.from({length: optCount}, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  currentShuffledOrder = indices;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  const letters = optCount === 2 ? ['✓', '✗'] : ['A', 'B', 'C', 'D'];
  indices.forEach((origIdx, displayIdx) => {
    const div = document.createElement('div');
    div.className = 'option';
    const lCls = isMulti ? 'letter square' : 'letter';
    div.innerHTML = `<span class="${lCls}">${letters[displayIdx]}</span><span style="flex:1">${paddedOpts[origIdx]}</span>`;
    div.dataset.origIdx = origIdx;
    div.onclick = () => selectOption(origIdx, isMulti);
    optDiv.appendChild(div);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('nextBtn').textContent = '提交答案';
  selected = isMulti ? [] : null;
  answered = false;
  updateProgress();
  updateScore();
}

function selectOption(idx, isMulti) {
  if (answered) return;
  if (isMulti) {
    const pos = selected.indexOf(idx);
    if (pos >= 0) selected.splice(pos, 1);
    else selected.push(idx);
    document.querySelectorAll('.option').forEach((el) => {
      const oi = parseInt(el.dataset.origIdx);
      el.classList.toggle('selected', selected.indexOf(oi) >= 0);
    });
    document.getElementById('nextBtn').disabled = selected.length === 0;
  } else {
    selected = idx;
    document.querySelectorAll('.option').forEach((el) => el.classList.toggle('selected', parseInt(el.dataset.origIdx) === idx));
    document.getElementById('nextBtn').disabled = false;
  }
}

function handleNext() {
  if (!answered) submitAnswer();
  else nextQuestion();
}

function submitAnswer() {
  if ((Array.isArray(selected) && selected.length === 0) || (!Array.isArray(selected) && selected === null)) return;
  answered = true;
  const qid = shuffled[currentIdx];
  const q = ALL_QUESTIONS.find(x => x.id === qid);
  const isMulti = q.multi === true;
  let correct = false;

  const opts = document.querySelectorAll('.option');
  if (isMulti) {
    const ansArr = q.multiAnswer;
    const sortedSelected = [...selected].sort();
    const sortedAnswer = [...ansArr].sort();
    correct = sortedSelected.length === sortedAnswer.length && sortedSelected.every((v,i) => v === sortedAnswer[i]);
    opts.forEach((el) => {
      el.classList.add('disabled');
      const oi = parseInt(el.dataset.origIdx);
      if (ansArr.indexOf(oi) >= 0) el.classList.add('show-correct');
      if (selected.indexOf(oi) >= 0 && ansArr.indexOf(oi) < 0) el.classList.add('wrong');
    });
  } else {
    correct = selected === q.answer;
    opts.forEach((el) => {
      el.classList.add('disabled');
      if (parseInt(el.dataset.origIdx) === q.answer) el.classList.add('show-correct');
      if (parseInt(el.dataset.origIdx) === selected && !correct) el.classList.add('wrong');
    });
  }

  const fb = document.getElementById('feedback');
  if (correct) {
    fb.className = 'feedback correct show';
    document.getElementById('fbText').textContent = '✅ 回答正确！';
    correctSet.add(qid);
  } else {
    fb.className = 'feedback wrong show';
    document.getElementById('fbText').textContent = '❌ 回答错误';
    wrongSet.add(qid);
  }
  document.getElementById('fbExplain').textContent = q.explain;
  document.getElementById('nextBtn').textContent = currentIdx < shuffled.length - 1 ? '下一题 →' : '查看成绩';
  updateScore();
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= shuffled.length) showResult();
  else showQuestion();
}

function updateProgress() {
  const total = shuffled.length;
  const pct = (currentIdx / total * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `第 ${currentIdx+1} / ${total} 题`;
}

function updateScore() {
  const total = shuffled.length;
  const done = currentIdx + (answered ? 1 : 0);
  const pct = (done / total * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `第 ${Math.min(done, total)} / ${total} 题`;
  document.getElementById('correctCount').textContent = correctSet.size;
  document.getElementById('wrongCount').textContent = wrongSet.size;
}

function showResult() {
  document.getElementById('questionCard').classList.add('hidden');
  document.getElementById('btnArea').classList.add('hidden');
  document.getElementById('resultCard').classList.add('show');

  const total = shuffled.length;
  const correct = correctSet.size;

  // Show name and date/time
  const endTime = new Date();
  const endStr = getNowStr();
  const duration = Math.round((endTime - startTime) / 1000);
  const durMin = Math.floor(duration / 60);
  const durSec = duration % 60;
  document.getElementById('resultName').textContent = '👤 ' + studentName;
  document.getElementById('resultDateTime').textContent = `📅 ${endStr.full}  ⏱ ${durMin}分${durSec}秒`;

  document.getElementById('finalScore').textContent = correct;
  document.getElementById('resultDetail').innerHTML = `答对 <span>${correct}</span> 题，答错 <span>${total - correct}</span> 题，正确率 <span>${(correct/total*100).toFixed(0)}%</span>`;

  if (wrongSet.size > 0) {
    document.getElementById('resultBreakdown').innerHTML = `薄弱环节涉及 ${wrongSet.size} 道技术题需要加强`;
    document.getElementById('retryBtn').classList.remove('hidden');
  } else {
    document.getElementById('resultBreakdown').textContent = '全部答对，太棒了！🎉';
  }
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = `${total} / ${total} 题 · 完成`;
}

function startRound2() {
  if (wrongSet.size === 0) return;
  round = 2;
  currentIdx = 0;
  shuffled = shuffle([...wrongSet]);
  wrongSet = new Set();

  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('retryBtn').classList.add('hidden');
  document.getElementById('questionCard').classList.remove('hidden');
  document.getElementById('btnArea').classList.remove('hidden');

  document.getElementById('roundLabel').textContent = '第 2 轮 · 错题再测';
  document.getElementById('roundLabel').style.display = 'inline-block';
  document.getElementById('roundTag').textContent = '🎯 薄弱环节再测（仅错题）';
  document.getElementById('roundTag').className = 'r2';

  const wrongDiv = document.getElementById('wrongTopicList');
  wrongDiv.innerHTML = `<strong>本轮针对 ${shuffled.length} 道错题进行再测：</strong>`;
  wrongDiv.classList.add('show');
  showQuestion();
}

function restart() {
  goHome();
}

initRound1();
</script>
