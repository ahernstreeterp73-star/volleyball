<script>
function copySVG() {
  const svg = document.querySelector('.svg-wrap svg').outerHTML;
  const html = '<div style="max-width:560px;margin:0 auto;">' + svg + '</div>';
  navigator.clipboard.writeText(html).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 已复制！粘贴到公众号';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制SVG代码 → 粘贴到公众号'; btn.classList.remove('copied'); }, 3000);
  });
}
</script>
